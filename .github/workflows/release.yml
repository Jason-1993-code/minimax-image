name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create zip
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          git archive -o minimax-image-${VERSION}.zip --prefix=minimax-image/ HEAD

      - name: Create tar.gz
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          git archive --format=tar.gz -o minimax-image-${VERSION}.tar.gz HEAD

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Creating release for version: $VERSION"
          ls -la
          gh release create "$VERSION" \
            --title "MiniMax Image Plugin $VERSION" \
            --notes "Initial release of MiniMax Image Plugin" \
            "minimax-image-${VERSION}.zip" \
            "minimax-image-${VERSION}.tar.gz"

      - name: Install clawhub
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token $CLAWHUB_TOKEN
          clawhub package publish . \
            --source-repo Jason-1993-code/minimax-image \
            --source-commit ${{ github.sha }} \
            --version ${{ github.ref_name }}
